spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/stock_sim}
    username: ${DB_USERNAME:stock_user}
    password: ${DB_PASSWORD:stock_password}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: true

  flyway:
    enabled: true

logging:
  level:
    org.hibernate.SQL: debug