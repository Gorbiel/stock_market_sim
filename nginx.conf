events {}

http {
    upstream stock_sim_app {
        server app-1:8080;
        server app-2:8080;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://stock_sim_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}